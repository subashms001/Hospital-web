{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-header bg-primary text-white text-center py-4 rounded-top-4">
          <h3 class="mb-0">
            <i class="bi bi-{% if 'Edit' in title %}pencil-square{% else %}plus-circle{% endif %} me-2"></i>{{ title }}
          </h3>
        </div>
        <div class="card-body p-4">
          <form method="POST">
            {% csrf_token %}
            <div class="row">
              <div class="col-md-12">{{ form | crispy }}</div>
            </div>
            <div class="d-flex gap-2 mt-3">
              <button type="submit" class="btn btn-primary flex-grow-1 py-2 fw-bold">
                <i class="bi bi-save me-1"></i>Save
              </button>
              <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary py-2">
                <i class="bi bi-x-lg me-1"></i>Cancel
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
