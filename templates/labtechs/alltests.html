{% extends "base.html" %}

{% block content %}
<div class="container py-5">
  <h2 class="fw-bold text-center mb-1"><i class="bi bi-droplet-half me-2 text-primary"></i>Available Lab Tests</h2>
  <p class="text-center text-muted mb-4">Complete list of tests offered at MediCare</p>

  <div class="row justify-content-center">
    <div class="col-md-10">
      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-primary">
                <tr>
                  <th class="ps-4">#</th>
                  <th>Test Name</th>
                  <th>Price (₹)</th>
                  <th>Report Time</th>
                </tr>
              </thead>
              <tbody>
                {% for test in alltests %}
                <tr>
                  <td class="ps-4 text-muted">{{ forloop.counter }}</td>
                  <td class="fw-semibold"><i class="bi bi-flask me-2 text-primary"></i>{{ test.name }}</td>
                  <td><span class="badge bg-success bg-opacity-10 text-success fw-semibold fs-6">₹{{ test.price }}</span></td>
                  <td><i class="bi bi-clock me-1 text-muted"></i>{{ test.time }}</td>
                </tr>
                {% endfor %}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
