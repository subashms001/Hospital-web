{% extends "base.html" %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-header bg-primary text-white text-center py-4 rounded-top-4">
          <h3 class="mb-0"><i class="bi bi-calendar2-plus me-2"></i>Book Your Appointment</h3>
        </div>
        <div class="card-body p-4">
          <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
              <label class="form-label fw-semibold"><i class="bi bi-person-badge me-1"></i>Doctor</label>
              {{ form.doctorname }}
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold"><i class="bi bi-hospital me-1"></i>Department / Category</label>
              {{ form.category }}
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold"><i class="bi bi-calendar3 me-1"></i>Appointment Date</label>
                <input type="date" name="date" class="form-control" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold"><i class="bi bi-clock me-1"></i>Time Slot</label>
                {{ form.time }}
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold"><i class="bi bi-currency-rupee me-1"></i>Consultation Charges</label>
              <input type="text" name="consultation_charges" class="form-control" value="500" readonly>
              <small class="text-muted d-block mt-1"><i class="bi bi-info-circle me-1"></i>Fixed fee for all specialists</small>
            </div>

            {% if form.errors %}
            <div class="alert alert-danger rounded-3">
              {{ form.errors }}
            </div>
            {% endif %}

            <button type="submit" class="btn btn-success w-100 py-2 fw-bold btn-lg">
              <i class="bi bi-check-circle me-1"></i>Confirm Booking
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
