<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare Hospital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-brand-custom {
            font-weight: 700;
            font-size: 1.4rem;
            color: #0d6efd !important;
            letter-spacing: 0.5px;
        }
        .navbar {
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            background: #ffffff !important;
        }
        .nav-link {
            font-weight: 500;
            color: #444 !important;
            transition: color 0.2s;
        }
        .nav-link:hover {
            color: #0d6efd !important;
        }
        .nav-link.active {
            color: #0d6efd !important;
        }
        .page-footer {
            background: #0d6efd;
            color: #fff;
            padding: 1.2rem 0;
            margin-top: 4rem;
            text-align: center;
            font-size: 0.92rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom" href="#">
                <i class="bi bi-hospital me-2"></i>MediCare
            </a>
            <!-- <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button> -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    {% if user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link" href="{% url 'home' %}"><i class="bi bi-house me-1"></i>Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'profile' %}"><i class="bi bi-person-circle me-1"></i>Profile</a></li>
                        <li class="nav-item ms-lg-2">
                            <a class="btn btn-outline-primary btn-sm" href="{% url 'logout' %}"><i class="bi bi-box-arrow-right me-1"></i>Log Out</a>
                        </li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link" href="{% url 'register' %}"><i class="bi bi-person-plus me-1"></i>Register</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'labtechreg' %}"><i class="bi bi-clipboard2-pulse me-1"></i>Lab Tech Register</a></li>
                        <li class="nav-item ms-lg-2">
                            <a class="btn btn-primary btn-sm" href="{% url 'login' %}"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <footer class="page-footer">
        <p class="mb-0">&copy; 2026 MediCare Hospital. All rights reserved.</p>
    </footer>

</body>
</html>
